name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Default to read-only. Jobs that need more request it explicitly.
permissions:
  contents: read

# A new push to a branch supersedes the previous run for that ref.
# Releases (tag refs) are handled by release.yml and never cancelled here.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: lint and format must pass before we spend matrix minutes on tests.
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # Build + test across the supported Node range. 22 is the declared floor
  # (package.json engines); 24 is current LTS.
  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci

      # The CLI is the product — fail the build if the published entrypoint
      # can't even print its version or help from the compiled output.
      - name: Smoke test compiled CLI
        run: |
          node dist/cli/index.js --version
          node dist/cli/index.js --help

      - name: Upload coverage
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # End-to-end verification of the data verbs (init/start/snapshot/restore/
  # clone/merge) against real containers for the Tier 1 engines. This is the
  # trust contract: a green badge means the verbs actually work, not just that
  # the code compiles. Single job (no matrix) — the suite exercises Docker,
  # not Node semantics.
  integration:
    name: Integration (Tier 1 engines)
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Run integration suite
        run: npm run test:integration

  # Catch packaging regressions (missing files, bad bin path) before a tag
  # turns them into a broken npm release.
  package:
    name: Package
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Verify the published tarball
        run: npm publish --dry-run

  # Advisory check. Runs as its own job so a noisy transitive advisory is
  # visible without masking the lint/test signal.
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
