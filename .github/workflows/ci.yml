name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Default to read-only. Jobs that need more request it explicitly.
permissions:
  contents: read

# A new push to a branch supersedes the previous run for that ref.
# Releases (tag refs) are handled by release.yml and never cancelled here.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: lint and format must pass before we spend matrix minutes on tests.
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # Build + test across the supported Node range. 18 is the declared floor
  # (package.json engines); 22 is current LTS.
  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x', '22.x']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci

      # The CLI is the product — fail the build if the published entrypoint
      # can't even print its version or help from the compiled output.
      - name: Smoke test compiled CLI
        run: |
          node dist/cli/index.js --version
          node dist/cli/index.js --help

      - name: Upload coverage
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # Catch packaging regressions (missing files, bad bin path) before a tag
  # turns them into a broken npm release.
  package:
    name: Package
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Verify the published tarball
        run: npm publish --dry-run

  # Advisory check. Runs as its own job so a noisy transitive advisory is
  # visible without masking the lint/test signal.
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
